<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dutch Bros Knowledge Base</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --blue: #004B8D;
    --blue-dark: #003366;
    --yellow: #FFC425;
    --white: #ffffff;
    --light: #f5f7fa;
    --gray: #6b7280;
    --border: #e5e7eb;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--light);
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .container {
    width: 100%;
    max-width: 780px;
    height: 90vh;
    background: var(--white);
    border-radius: 16px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.1);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* HEADER */
  .header {
    background: var(--blue-dark);
    padding: 24px 32px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: relative;
    overflow: hidden;
  }

  .header::after {
    content: '';
    position: absolute;
    right: -20px; top: -20px;
    width: 120px; height: 120px;
    background: var(--yellow);
    border-radius: 50%;
    opacity: 0.1;
  }

  .header-icon {
    width: 48px;
    height: 48px;
    background: var(--yellow);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    flex-shrink: 0;
  }

  .header-text h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    color: var(--white);
    letter-spacing: 2px;
    line-height: 1;
  }

  .header-text p {
    font-size: 12px;
    color: rgba(255,255,255,0.6);
    margin-top: 3px;
  }

  .status {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: rgba(255,255,255,0.6);
  }

  .status-dot {
    width: 8px;
    height: 8px;
    background: #22c55e;
    border-radius: 50%;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* CHAT AREA */
  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 24px 32px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .chat-area::-webkit-scrollbar { width: 6px; }
  .chat-area::-webkit-scrollbar-track { background: transparent; }
  .chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* MESSAGES */
  .message {
    display: flex;
    gap: 12px;
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .message.user {
    flex-direction: row-reverse;
  }

  .avatar {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }

  .avatar.bot {
    background: var(--blue);
  }

  .avatar.user {
    background: var(--yellow);
  }

  .bubble {
    max-width: 70%;
    padding: 12px 16px;
    border-radius: 14px;
    font-size: 14px;
    line-height: 1.65;
  }

  .message.bot .bubble {
    background: var(--light);
    color: #1a1a2e;
    border-bottom-left-radius: 4px;
  }

  .message.user .bubble {
    background: var(--blue);
    color: var(--white);
    border-bottom-right-radius: 4px;
  }

  /* TYPING INDICATOR */
  .typing {
    display: flex;
    gap: 4px;
    padding: 14px 16px;
    background: var(--light);
    border-radius: 14px;
    border-bottom-left-radius: 4px;
    width: fit-content;
  }

  .typing span {
    width: 8px;
    height: 8px;
    background: var(--gray);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }

  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-6px); }
  }

  /* SUGGESTED QUESTIONS */
  .suggestions {
    padding: 0 32px 16px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .suggestion {
    background: var(--light);
    border: 1px solid var(--border);
    color: var(--blue);
    font-size: 12px;
    padding: 6px 14px;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'DM Sans', sans-serif;
  }

  .suggestion:hover {
    background: var(--blue);
    color: var(--white);
    border-color: var(--blue);
  }

  /* INPUT AREA */
  .input-area {
    padding: 20px 32px 24px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 12px;
    align-items: flex-end;
  }

  .input-wrapper {
    flex: 1;
    background: var(--light);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 12px 16px;
    transition: border-color 0.2s;
  }

  .input-wrapper:focus-within {
    border-color: var(--blue);
  }

  textarea {
    width: 100%;
    border: none;
    background: transparent;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: #1a1a2e;
    resize: none;
    outline: none;
    max-height: 120px;
    line-height: 1.5;
  }

  textarea::placeholder { color: var(--gray); }

  .send-btn {
    width: 48px;
    height: 48px;
    background: var(--blue);
    border: none;
    border-radius: 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s, transform 0.1s;
    flex-shrink: 0;
  }

  .send-btn:hover { background: var(--blue-dark); }
  .send-btn:active { transform: scale(0.95); }
  .send-btn:disabled { background: var(--border); cursor: not-allowed; }

  .send-btn svg {
    width: 20px;
    height: 20px;
    fill: white;
  }

  .footer-note {
    text-align: center;
    font-size: 11px;
    color: var(--gray);
    margin-top: 8px;
  }
</style>
</head>
<body>

<div class="container">

  <div class="header">
    <div class="header-icon">☕</div>
    <div class="header-text">
      <h1>Dutch Bros Knowledge Base</h1>
      <p>AI-powered answers for broistas</p>
    </div>
    <div class="status">
      <div class="status-dot"></div>
      Online
    </div>
  </div>

  <div class="chat-area" id="chatArea">
    <div class="message bot">
      <div class="avatar bot">🤖</div>
      <div class="bubble">Hey! I'm your Dutch Bros knowledge assistant. Ask me anything about our drinks, training, culture, or policies!</div>
    </div>
  </div>

  <div class="suggestions" id="suggestions">
    <button class="suggestion" onclick="askSuggestion(this)">What is the Annihilator?</button>
    <button class="suggestion" onclick="askSuggestion(this)">How long is broista training?</button>
    <button class="suggestion" onclick="askSuggestion(this)">Tell me about Dutch Rewards</button>
    <button class="suggestion" onclick="askSuggestion(this)">What is the uniform policy?</button>
  </div>

  <div class="input-area">
    <div class="input-wrapper">
      <textarea 
        id="questionInput" 
        placeholder="Ask a question about Dutch Bros..." 
        rows="1"
        onkeydown="handleKeydown(event)"
        oninput="autoResize(this)"
      ></textarea>
    </div>
    <button class="send-btn" id="sendBtn" onclick="sendQuestion()">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
      </svg>
    </button>
  </div>
  <div class="footer-note">Powered by RAG · GPT-4o · ChromaDB</div>

</div>

<script>
  const chatArea = document.getElementById('chatArea');
  const input = document.getElementById('questionInput');
  const sendBtn = document.getElementById('sendBtn');

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = el.scrollHeight + 'px';
  }

  function handleKeydown(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendQuestion();
    }
  }

  function askSuggestion(btn) {
    input.value = btn.textContent;
    document.getElementById('suggestions').style.display = 'none';
    sendQuestion();
  }

  function addMessage(text, type) {
    const div = document.createElement('div');
    div.className = `message ${type}`;
    const avatar = type === 'bot' ? '🤖' : '👤';
    div.innerHTML = `
      <div class="avatar ${type}">${avatar}</div>
      <div class="bubble">${text}</div>
    `;
    chatArea.appendChild(div);
    chatArea.scrollTop = chatArea.scrollHeight;
  }

  function showTyping() {
    const div = document.createElement('div');
    div.className = 'message bot';
    div.id = 'typing';
    div.innerHTML = `
      <div class="avatar bot">🤖</div>
      <div class="typing">
        <span></span><span></span><span></span>
      </div>
    `;
    chatArea.appendChild(div);
    chatArea.scrollTop = chatArea.scrollHeight;
  }

  function hideTyping() {
    const t = document.getElementById('typing');
    if (t) t.remove();
  }

  async function sendQuestion() {
    const question = input.value.trim();
    if (!question) return;

    addMessage(question, 'user');
    input.value = '';
    input.style.height = 'auto';
    sendBtn.disabled = true;
    showTyping();

    try {
      const response = await fetch('/query', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question })
      });

      const data = await response.json();
      hideTyping();
      addMessage(data.answer || 'Sorry, I could not get an answer.', 'bot');
    } catch (err) {
      hideTyping();
      addMessage('Something went wrong. Please try again.', 'bot');
    }

    sendBtn.disabled = false;
    input.focus();
  }
</script>

</body>
</html>
